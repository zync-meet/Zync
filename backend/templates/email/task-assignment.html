<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task assignment</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; color: #333; margin: 0; padding: 24px 16px; background: #f9fafb;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 560px; margin: 0 auto;">
    <tr>
      <td>
        <h2 style="font-size: 20px; margin: 0 0 16px;">New task assignment</h2>
        <p style="margin: 0 0 16px; font-size: 15px; line-height: 1.5;">You have been assigned a new task in project <strong>{{projectName}}</strong>.</p>
        <div style="background: #f4f4f4; padding: 15px; border-radius: 8px; margin: 15px 0;">
          {{taskDetails}}
        </div>
        <p style="margin: 0; font-size: 14px; color: #52525b;">Please log in to Zync to view more details.</p>
      </td>
    </tr>
  </table>
</body>
</html>
