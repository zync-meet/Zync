<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat request</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f4f5; margin: 0; padding: 32px 16px; color: #18181b;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 520px; margin: 0 auto; background: #fff; border-radius: 12px; border: 1px solid #e4e4e7; padding: 28px;">
    <tr>
      <td style="padding-bottom: 24px;">
        <table role="presentation" cellpadding="0" cellspacing="0">
          <tr>
            <td><img src="{{logo}}" alt="Zync" width="34" height="34" style="border-radius: 9px; display: block;"></td>
            <td style="padding-left: 10px; font-size: 17px; font-weight: 700; color: #18181b;">Zync</td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <td>
        <h2 style="font-size: 20px; margin: 0 0 16px;">Chat request</h2>
        <p style="margin: 0 0 12px; font-size: 15px;"><strong>{{senderName}}</strong> wants to chat with you on ZYNC.</p>
        <p style="margin: 0 0 20px; font-size: 15px; color: #52525b;"><em>&quot;{{message}}&quot;</em></p>
        <p style="margin: 0; font-size: 14px; color: #71717a;">Log in to ZYNC to view and reply.</p>
      </td>
    </tr>
  </table>
</body>
</html>
