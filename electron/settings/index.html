<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="settings-container">
        <h1>Settings</h1>

        <section class="settings-section">
            <h2>Downloads</h2>
            <p>Download the application for other platforms:</p>
            <div class="download-buttons">
                <button id="btn-win" class="download-btn">Windows (.exe)</button>
                <button id="btn-mac" class="download-btn">macOS (.dmg)</button>
                <button id="btn-linux" class="download-btn">Linux (.AppImage)</button>
            </div>
        </section>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
