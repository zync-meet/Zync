# =============================================================================
# Dependabot Configuration — ZYNC Desktop Application
# =============================================================================
#
# Configures automated dependency updates via GitHub Dependabot.
# Checks for updates to npm packages and GitHub Actions weekly.
#
# =============================================================================

version: 2

updates:
  # Check npm dependencies weekly
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
    reviewers:
      - "ChitkulLakshya"

  # Check GitHub Actions versions weekly
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
      - "automated"
    commit-message:
      prefix: "ci(deps)"
