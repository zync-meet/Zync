# =============================================================================
# TYPE LABELS
# =============================================================================
# These labels indicate the type of change in the PR.
# Note: These are typically applied manually, but some can be auto-detected.

# Security-related changes
type:security:
  - changed-files:
      - any-glob-to-any-file:
          - '**/security/**/*'
          - '**/auth/**/*'
          - 'electron/config/csp.ts'
          - 'backend/middleware/authMiddleware.js'
          - 'SECURITY.md'

# Performance-related changes
type:performance:
  - changed-files:
