platform:windows:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*windows*'
          - '**/*win32*'
          - '**/*.exe'
          - 'build/icons/*.ico'

platform:macos:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*darwin*'
          - '**/*macos*'
          - '**/*mac*'
          - '**/*.dmg'
          - 'build/icons/*.icns'

platform:linux:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*linux*'
          - '**/*.deb'
          - '**/*.rpm'
          - '**/*.AppImage'
