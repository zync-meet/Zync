# =============================================================================
# ZYNC Desktop Application - Auto-Labeler Configuration
# =============================================================================
#
# This file defines the rules for automatically labeling pull requests based
# on the files they modify. It's used by the .github/workflows/labeler.yml
# workflow with the actions/labeler GitHub Action.
#
# Documentation: https://github.com/actions/labeler
#
# =============================================================================
# Configuration Syntax
# =============================================================================
#
# Each top-level key is a label name. The value is a list of match rules.
# A PR gets the label if ANY rule matches.
#
# Match types:
# - changed-files: Match based on file changes
#   - any-glob-to-any-file: Label if ANY changed file matches ANY pattern
#   - any-glob-to-all-files: Label if ANY pattern matches ALL changed files
#   - all-globs-to-any-file: Label if ALL patterns match at least one file
#   - all-globs-to-all-files: Label if ALL patterns match ALL files
#
# Glob patterns:
# - * matches any file in a directory
# - ** matches any file in any subdirectory
# - ! negates a pattern (exclude)
#
# =============================================================================

# =============================================================================
# AREA LABELS
# =============================================================================
# These labels indicate which area of the codebase the PR modifies.

# -----------------------------------------------------------------------------
# Electron
# -----------------------------------------------------------------------------
# Changes to the Electron desktop application layer.

area:electron:
  - changed-files:
      - any-glob-to-any-file:
          - 'electron/**/*'
          - 'electron-builder.yml'
          - 'tsconfig.electron.json'

# Electron Main Process
area:electron-main:
  - changed-files:
      - any-glob-to-any-file:
          - 'electron/main.ts'
          - 'electron/main/**/*'

