appId: com.zync.desktop
productName: ZYNC
directories:
  output: dist_electron
  buildResources: build
files:
  - "dist-electron/**/*"
  - "dist/**/*"
  - "package.json"

win:
  target: nsis
  icon: build/icons/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ZYNC

mac:
  target: dmg
  icon: build/icons/icon.icns
  category: public.app-category.productivity
dmg:
  title: "${productName} ${version}"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target: AppImage
  icon: build/icons/icon.png
  category: Office
  executableArgs:
    - "--no-sandbox"
appImage:
  license: LICENSE
